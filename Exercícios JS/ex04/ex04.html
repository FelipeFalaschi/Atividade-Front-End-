<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Infinity Bank</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 400px;
      margin: 50px auto;
      padding: 0 20px;
    }

    h2 {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: #555;
    }

    input, select {
      width: 100%;
      padding: 10px;
      font-size: 15px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 6px;
      margin-bottom: 16px;
    }

    button {
      width: 100%;
      padding: 10px;
      font-size: 15px;
      background-color: #444;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background-color: #222;
    }

    #resultado {
      margin-top: 16px;
      padding: 14px;
      border-radius: 6px;
      font-size: 15px;
      background-color: #cce5ff;
      color: #004085;
      display: none;
      line-height: 1.8;
    }
  </style>
</head>
<body>

  <h2>Simulador Infinity Bank</h2>

  <label for="bandeira">Bandeira do cartão:</label>
  <select id="bandeira">
    <option value="visa">Visa (2%)</option>
    <option value="master">Mastercard (1.85%)</option>
    <option value="elo">Elo (3%)</option>
  </select>

  <label for="valor">Valor da venda (R$):</label>
  <input type="number" id="valor" placeholder="Ex: 100.00" step="0.01" min="0" />

  <label for="parcelas">Número de parcelas:</label>
  <input type="number" id="parcelas" placeholder="Ex: 3" min="1" max="12" />

  <button id="btnCalcular">Calcular</button>

  <div id="resultado"></div>

  <script src="script4.js"></script>

</body>
</html>
