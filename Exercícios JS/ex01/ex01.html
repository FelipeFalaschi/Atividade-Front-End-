<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Validador de CPF</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 400px;
      margin: 50px auto;
      padding: 0 20px;
    }

    h2 {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: #555;
    }

    input {
      width: 100%;
      padding: 10px;
      font-size: 15px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      width: 100%;
      margin-top: 12px;
      padding: 10px;
      font-size: 15px;
      background-color: #444;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background-color: #222;
    }

    #resultado {
      margin-top: 16px;
      padding: 12px;
      border-radius: 6px;
      font-size: 15px;
      font-weight: bold;
      text-align: center;
      display: none;
    }

    .valido {
      background-color: #d4edda;
      color: #155724;
    }

    .invalido {
      background-color: #f8d7da;
      color: #721c24;
    }
  </style>
</head>
<body>

  <h2>Validador de CPF</h2>

  <label for="cpfInput">Digite o CPF (apenas números):</label>
  <input type="text" id="cpfInput" placeholder="Ex: 12345678909" maxlength="14" />
  <button onclick="validar()">Validar</button>

  <div id="resultado"></div>

  <script src="script1.js"></script>

</body>
</html>
