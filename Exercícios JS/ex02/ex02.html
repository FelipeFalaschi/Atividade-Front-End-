<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Conversor de Temperatura</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 400px;
      margin: 50px auto;
      padding: 0 20px;
    }

    h2 {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: #555;
    }

    input {
      width: 100%;
      padding: 10px;
      font-size: 15px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 6px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>

  <h2>Conversor de Temperatura</h2>

  <label for="celsius">Celsius (°C):</label>
  <input type="number" id="celsius" placeholder="Digite em Celsius" step="0.1" />

  <label for="fahrenheit">Fahrenheit (°F):</label>
  <input type="number" id="fahrenheit" placeholder="Digite em Fahrenheit" step="0.1" />

  <script src="script2.js"></script>

</body>
</html>
