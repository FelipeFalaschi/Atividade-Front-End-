<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Média Escolar</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 400px;
      margin: 50px auto;
      padding: 0 20px;
    }

    h2 {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: #555;
    }

    input {
      width: 100%;
      padding: 10px;
      font-size: 15px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 6px;
      margin-bottom: 16px;
    }

    button {
      width: 100%;
      padding: 10px;
      font-size: 15px;
      background-color: #444;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background-color: #222;
    }

    #resultado {
      margin-top: 16px;
      padding: 12px;
      border-radius: 6px;
      font-size: 15px;
      font-weight: bold;
      text-align: center;
      display: none;
    }

    .aprovado {
      background-color: #cce5ff;
      color: #004085;
    }

    .exame {
      background-color: #d4edda;
      color: #155724;
    }

    .reprovado {
      background-color: #f8d7da;
      color: #721c24;
    }
  </style>
</head>
<body>

  <h2>Média Escolar</h2>

  <label for="nome">Nome do aluno:</label>
  <input type="text" id="nome" placeholder="Digite o nome" />

  <label for="nota1">Nota 1:</label>
  <input type="number" id="nota1" placeholder="0 a 10" step="0.1" min="0" max="10" />

  <label for="nota2">Nota 2:</label>
  <input type="number" id="nota2" placeholder="0 a 10" step="0.1" min="0" max="10" />

  <label for="nota3">Nota 3:</label>
  <input type="number" id="nota3" placeholder="0 a 10" step="0.1" min="0" max="10" />

  <button id="btnCalcular">Calcular</button>

  <div id="resultado"></div>

  <script src="script3.js"></script>

</body>
</html>
